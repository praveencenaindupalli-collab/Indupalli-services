<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - Indupalli Services</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Calibri,Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#003366,#0056d2,#1e90ff);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
background:#fff;
width:100%;
max-width:500px;
padding:35px;
border-radius:25px;
box-shadow:0 8px 30px rgba(0,0,0,.3);
text-align:center;
}

.logo{
width:120px;
margin-bottom:15px;
}

.company{
font-size:30px;
font-weight:bold;
color:#0056d2;
margin-bottom:10px;
}

.desc{
color:#666;
line-height:24px;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:2px solid #d6e4ff;
border-radius:12px;
background:#eef4ff;
font-size:16px;
}

button{
width:100%;
padding:16px;
background:#009900;
border:none;
color:white;
font-size:18px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
}

button:hover{
background:#007700;
}

.login-link{
margin-top:20px;
}

.login-link a{
color:#0056d2;
font-weight:bold;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<img src="1000174411.png" class="logo">

<div class="company">
Indupalli Services
</div>

<h2>Create Job Seeker Account</h2>

<p class="desc">
Create your account to apply for jobs, upload resumes and track applications.
</p>

<input type="email" id="email" placeholder="Email Address">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">
Create Account
</button>

<div class="login-link">
Already have an account?
<a href="Login.html">Login</a>
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_STORAGE_BUCKET",
messagingSenderId:"YOUR_SENDER_ID",
appId:"YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

createUserWithEmailAndPassword(
auth,
email,
password
)

.then(() => {

alert("Account Created Successfully");

window.location.href="Login.html";

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
