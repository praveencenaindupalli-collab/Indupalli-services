<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>

<style>
body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f7fc;
}

.box{
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:green;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
cursor:pointer;
}

a{
text-decoration:none;
}
</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">
Create Account
</button>

<p>
Already have account?
<a href="login.html">Login</a>
</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAJWdsNykkCp9tJfoBiZNoVfWT0orM6BHA",
authDomain: "indupalli-services-18404.firebaseapp.com",
projectId: "indupalli-services-18404",
storageBucket: "indupalli-services-18404.firebasestorage.app",
messagingSenderId: "187485195719",
appId: "1:187485195719:web:a2f422b12c47ea2d549de2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then(() => {
alert("Account Created Successfully");
window.location.href="login.html";
})

.catch((error)=>{
alert(error.message);
});
}
</script>

</body>
</html>
