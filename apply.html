<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Indupalli Services - Job Portal
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Calibri,Arial,sans-serif;
}

body{
background:linear-gradient(
135deg,
#003366,
#0056d2,
#1e90ff
);
padding:20px;
min-height:100vh;
}

.container{
max-width:1000px;
margin:auto;
background:white;
border-radius:25px;
padding:35px;
box-shadow:0 8px 30px rgba(0,0,0,0.25);
}

.logo{
width:130px;
display:block;
margin:auto;
margin-bottom:15px;
}

.company-name{
text-align:center;
font-size:38px;
font-weight:bold;
color:#0056d2;
}

.heading{
text-align:center;
font-size:30px;
font-weight:bold;
color:#003366;
margin-top:10px;
}

.description{
text-align:center;
margin-top:15px;
margin-bottom:30px;
color:#555;
line-height:28px;
}

.profile-section{
background:#eef5ff;
padding:30px;
border-radius:20px;
margin-bottom:30px;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#003366;
}

input,
textarea{
width:100%;
padding:15px;
border:2px solid #d6e4ff;
border-radius:12px;
font-size:16px;
}

textarea{
resize:none;
}

.submit-btn{
width:100%;
padding:18px;
background:#0056d2;
color:white;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
}

.job-title{
text-align:center;
font-size:32px;
color:#0056d2;
margin:30px 0 20px;
}

.job-card{
background:#eef5ff;
padding:20px;
border-radius:15px;
margin-bottom:20px;
border-left:5px solid #0056d2;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-content{
background:white;
padding:30px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<img src="1000174411.png"
class="logo">

<div class="company-name">
Indupalli Services
</div>

<div class="heading">
Job Seeker Portal
</div>

<p class="description">
Create your profile and apply for jobs.
</p>
<div class="profile-section"><h2 style="
text-align:center;
color:#0056d2;
margin-bottom:20px;
">
Job Application Form
</h2><div class="form-group">
<label>Full Name</label>
<input
type="text"
id="fullname"
placeholder="Enter Full Name">
</div><div class="form-group">
<label>Email Address</label>
<input
type="email"
id="email"
placeholder="Enter Email Address">
</div><div class="form-group">
<label>Phone Number</label>
<input
type="tel"
id="phone"
placeholder="Enter Phone Number">
</div><div class="form-group">
<label>Current Location</label>
<input
type="text"
id="location"
placeholder="Enter Location">
</div><div class="form-group">
<label>Years of Experience</label>
<input
type="text"
id="experience"
placeholder="Example: 2 Years">
</div><div class="form-group">
<label>Skills</label>
<input
type="text"
id="skills"
placeholder="Java, HR, Support">
</div><div class="form-group">
<label>Upload Resume</label>
<input
type="file"
id="resume"
accept=".pdf,.doc,.docx">
</div><div class="form-group">
<label>About Yourself</label><textarea
id="about"
rows="5"
placeholder="Tell us about yourself">
</textarea></div><button
type="button"
class="submit-btn"
onclick="window.submitApplication()">
Submit Application
</button>

</div><h2 class="job-title">
Current Job Openings
<span id="jobCount">0</span>
</h2><input
type="text"
id="jobSearch"
placeholder="🔍 Search Jobs"
onkeyup="searchJobs()"
style="
margin-bottom:20px;
">

<div id="jobsContainer"></div>
<div id="popup" class="popup"><div class="popup-content"><img src="1000174411.png"
style="
width:100px;
margin-bottom:15px;
">

<h2 style="color:#0056d2;">
Indupalli Services
</h2><div id="popupText"></div><br><button
onclick="closePopup()"
class="submit-btn">
OK
</button>

</div></div><script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAJWdsNykkCp9tJfoBiZNoVfWT0orM6BHA",

authDomain:
"indupalli-services-18404.firebaseapp.com",

projectId:
"indupalli-services-18404",

storageBucket:
"indupalli-services-18404.firebasestorage.app",

messagingSenderId:
"187485195719",

appId:
"1:187485195719:web:a2f422b12c47ea2d549de2"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let selectedJob = "";

window.applyJob = function(job){

selectedJob = job;

localStorage.setItem(
"selectedJob",
job
);

document.getElementById(
"popupText"
).innerHTML = `

<h3 style="
color:#0056d2;
margin-bottom:15px;
">
${job}
</h3>

<p>
Login or Create Account to apply for this position.
</p>

<br>

<a href="Login.html"
style="
background:#0056d2;
color:white;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
margin-right:10px;
">
Login
</a>

<a href="signup.html"
style="
background:#28a745;
color:white;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
">
Create Account
</a>

`;

document.getElementById(
"popup"
).style.display = "flex";

};

window.submitApplication = async function(){

let fullname =
document.getElementById("fullname").value.trim();

let email =
document.getElementById("email").value.trim();

let phone =
document.getElementById("phone").value.trim();

let location =
document.getElementById("location").value.trim();

let experience =
document.getElementById("experience").value.trim();

let skills =
document.getElementById("skills").value.trim();

let about =
document.getElementById("about").value.trim();

let jobRole =
selectedJob;
if(
fullname === "" ||
email === "" ||
phone === "" ||
location === "" ||
experience === "" ||
skills === "" ||
jobRole === ""
){

showPopup(
"⚠ Please select a job and fill all required details."
);

return;

}

try{

let applicationId =
"APP" + Date.now();

await addDoc(
collection(db,"jobApplications"),
{
fullname,
email,
phone,
location,
experience,
skills,
about,
jobRole,
jobTitle: jobRole,
applicationId,
submittedAt:new Date()
}
);

showPopup(
"✅ Application Submitted Successfully<br><br>Application ID: "

+ applicationId
  );

}catch(error){

showPopup(
error.message
);

}

};

window.showPopup = function(message){

document.getElementById(
"popupText"
).innerHTML = message;

document.getElementById(
"popup"
).style.display = "flex";

};

window.closePopup = function(){

document.getElementById(
"popup"
).style.display = "none";

};

async function loadJobCount(){

const jobsSnapshot =
await getDocs(
collection(db,"jobs")
);

document.getElementById(
"jobCount"
).innerText =
jobsSnapshot.size;

}

async function loadJobs(){

const jobsSnapshot =
await getDocs(
collection(db,"jobs")
);

let html = "";

jobsSnapshot.forEach((doc)=>{

const job = doc.data();

html += `

<div class="job-card"><h3>${job.title}</h3><p>📍 ${job.location}</p><p>👤 ${job.postedBy}</p><p>📅 ${job.postedOn}</p><button
class="submit-btn"
onclick="applyJob('${job.title}')">
Apply Now
</button>

</div>`;

});

document.getElementById(
"jobsContainer"
).innerHTML = html;

}

window.searchJobs = function(){

let input =
document.getElementById(
"jobSearch"
).value.toLowerCase();

let cards =
document.querySelectorAll(
".job-card"
);

cards.forEach(card=>{

let title =
card.querySelector("h3")
.innerText
.toLowerCase();

if(title.includes(input)){

card.style.display = "";

}else{

card.style.display = "none";

}

});

};

loadJobCount();

loadJobs();

</script><script>

function closePopup(){

document.getElementById(
"popup"
).style.display = "none";

}

</script></div></body>
</html>
