<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Indupalli Services - Apply Jobs
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Calibri, Arial, sans-serif;
}

body{
background:
linear-gradient(
135deg,
#003366,
#0056d2,
#1e90ff
);
min-height:100vh;
padding:20px;
}

.container{
max-width:950px;
margin:auto;
background:#fff;
border-radius:25px;
padding:35px;
box-shadow:
0 8px 30px
rgba(0,0,0,0.25);
}

.logo{
width:130px;
display:block;
margin:auto;
margin-bottom:15px;
}

.company-name{
text-align:center;
font-size:38px;
font-weight:bold;
color:#0056d2;
}

.heading{
text-align:center;
font-size:30px;
margin-top:10px;
font-weight:bold;
color:#003366;
}

.description{
text-align:center;
color:#555;
line-height:28px;
margin-top:15px;
margin-bottom:35px;
font-size:16px;
}

.profile-section{
background:#eef5ff;
padding:30px;
border-radius:20px;
margin-bottom:35px;
}

.profile-section h2{
text-align:center;
color:#0056d2;
margin-bottom:25px;
font-size:28px;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#003366;
}

input,
select,
textarea{
width:100%;
padding:15px;
border:2px solid #d6e4ff;
border-radius:12px;
font-size:16px;
background:#fff;
}

textarea{
resize:none;
}

.submit-btn{
width:100%;
padding:18px;
background:#0056d2;
color:#fff;
font-size:20px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
margin-top:25px;
}

.submit-btn:hover{
background:#003ea8;
}

.job-title{
text-align:center;
font-size:32px;
color:#0056d2;
margin-bottom:20px;
}

.job-card{
background:#eef5ff;
padding:20px;
border-radius:18px;
margin-bottom:20px;
border-left:
6px solid #0056d2;
box-shadow:
0 4px 10px
rgba(0,0,0,0.08);
}

.job-card h3{
color:#0056d2;
margin-bottom:10px;
font-size:24px;
}

.job-card p{
color:#444;
line-height:26px;
}

</style>
</head>

<body>

<div class="container">

<img src="1000174411.png"
class="logo">

<div class="company-name">
Indupalli Services
</div>

<div class="heading">
Job Seeker Portal
</div>

<p class="description">
Create your account, complete your profile,
track applications, and apply for jobs at
Indupalli Services.
</p>

<div class="profile-section">
  <h2>
Create Your Job Seeker Account
</h2>

<p style="
text-align:center;
color:#666;
margin-bottom:20px;
">
Register first before applying for jobs.
</p>
<div class="form-group">
<label>Full Name</label>
<input
type="text"
id="fullname"
placeholder="Enter Full Name">
</div>

<div class="form-group">
<label>Email Address</label>
<input
type="email"
id="email"
placeholder="Enter Email">
</div>

<div class="form-group">
<label>Phone Number</label>
<input
type="tel"
id="phone"
placeholder="Enter Phone Number">
</div>

<div class="form-group">
<label>Current Location</label>
<input
type="text"
id="location"
placeholder="Enter Location">
</div>

<div class="form-group">
<label>Years of Experience</label>
<input
type="text"
id="experience"
placeholder="Example: 2 Years">
</div>

<div class="form-group">
<label>Skills</label>
<input
type="text"
id="skills"
placeholder="Java, HR, Support">
</div>

<div class="form-group">
<label>Select Job Role</label>

<select id="jobRole">
<option>Select Role</option>
<option>Customer Support Executive</option>
<option>Backend Developer</option>
<option>HR Recruiter</option>
<option>Sales Executive</option>
<option>Marketing Executive</option>
</select>
</div>

<div class="form-group">
<label>Upload Profile Photo</label>

<input
type="file"
id="profilePhoto"
accept="image/*">
</div>

<div class="form-group">
<label>Upload Resume (PDF/DOC)</label>

<input
type="file"
id="resume"
accept=".pdf,.doc,.docx">
</div>

<div class="form-group">
<label>About Yourself</label>

<textarea
id="about"
rows="5"
placeholder="Tell us about yourself">
</textarea>
</div>

<button
class="submit-btn"
onclick="submitApplication()">
Submit Application
</button>

</div>

<h2 class="job-title">
Current Job Openings <span id="jobCount">0</span>
</h2>

<div id="jobsContainer"></div>
<!-- Professional Popup -->
<div id="popup"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="
background:white;
padding:30px;
border-radius:20px;
width:90%;
max-width:350px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
">

<img src="1000174411.png"
style="
width:90px;
margin-bottom:15px;
">

<h2 style="
color:#0056d2;
margin-bottom:10px;
">
Indupalli Services
</h2>

<p id="popupText"
style="
font-size:16px;
color:#333;
margin-bottom:20px;
">
</p>

<button
onclick="closePopup()"
style="
background:#0056d2;
color:white;
border:none;
padding:12px 30px;
border-radius:10px;
font-size:16px;
cursor:pointer;
">
OK
</button>

</div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAJWdsNykkCp9tJfoBiZNoVfWT0orM6BHA",
authDomain: "indupalli-services-18404.firebaseapp.com",
projectId: "indupalli-services-18404",
storageBucket: "indupalli-services-18404.firebasestorage.app",
messagingSenderId: "187485195719",
appId: "1:187485195719:web:a2f422b12c47ea2d549de2"
};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

// Apply button
window.applyJob =
function(job){

document.getElementById(
"jobRole"
).value = job;

window.scrollTo({
top:0,
behavior:"smooth"
});

showPopup(
"You selected: " +
job +
"\n\nComplete profile and click Submit Application."
);

};

// Submit button
window.submitApplication =
async function(){

let fullname =
document.getElementById("fullname").value.trim();

let email =
document.getElementById("email").value.trim();

let phone =
document.getElementById("phone").value.trim();

let location =
document.getElementById("location").value.trim();

let experience =
document.getElementById("experience").value.trim();

let skills =
document.getElementById("skills").value.trim();

let jobRole =
document.getElementById("jobRole").value;

let about =
document.getElementById("about").value.trim();

if(
fullname==="" ||
email==="" ||
phone==="" ||
location==="" ||
experience==="" ||
skills==="" ||
jobRole==="Select Role"
){
showPopup(
"Please fill all required details"
);
return;
}

try{

let applicationId =
"APP" + Date.now();

await addDoc(
collection(
db,
"jobApplications"
),
{
fullname,
email,
phone,
location,
experience,
skills,
jobRole,
about,
applicationId,
submittedAt:
new Date()
}
);

showPopup(
"Application Submitted Successfully!\n\nApplication ID: "
+ applicationId
);

} catch(error){

showPopup(
error.message
);

}

};

// Popup functions
window.showPopup =
function(message){

document.getElementById(
"popupText"
).innerText = message;

document.getElementById(
"popup"
).style.display = "flex";

};

window.closePopup =
function(){

document.getElementById(
"popup"
).style.display = "none";

};
async function loadJobCount() {

  const jobsSnapshot = await getDocs(
    collection(db, "jobs")
  );

  document.getElementById("jobCount").innerText =
    jobsSnapshot.size;

}

loadJobCount();
async function loadJobs() {

  const jobsSnapshot = await getDocs(
    collection(db, "jobs")
  );

  let html = "";

  jobsSnapshot.forEach((doc) => {

    const job = doc.data();

html += `
  <div class="job-card">
    <h3>${job.title}</h3>

    <p>📍 ${job.location}</p>

<p>👤 ${job.postedBy}</p>

<p>📅 ${job.postedOn}</p>

    <button
      class="submit-btn"
      onclick="applyJob('${job.title}')">
      Apply Now
    </button>
  </div>
`;
  });

  document.getElementById("jobsContainer").innerHTML = html;
}

loadJobs();

loadJobs();
</script>

</body>
</html>
