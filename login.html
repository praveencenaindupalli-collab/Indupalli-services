<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Indupalli Services - Login
</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Calibri,Arial,sans-serif;
}

body{
background:linear-gradient(
135deg,
#003366,
#0056d2,
#1e90ff
);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
background:white;
width:100%;
max-width:500px;
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:
0 8px 30px rgba(0,0,0,0.25);
}

.logo{
width:120px;
margin-bottom:15px;
}

.company-name{
font-size:32px;
font-weight:bold;
color:#0056d2;
margin-bottom:10px;
}

.description{
color:#555;
line-height:24px;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:2px solid #d6e4ff;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:16px;
background:#0056d2;
color:white;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#003ea8;
}

</style></head><body><div class="container"><img src="1000174411.png"
class="logo">

<div class="company-name">
Indupalli Services
</div><h2>
Job Seeker Login
</h2><p class="description">
Login to apply for jobs and track applications.
</p><input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>
<p style="margin-top:15px;"><a href="#"
onclick="forgotPassword()"
style="
color:#0056d2;
font-weight:bold;
text-decoration:none;
">
Forgot Password?
</a>

</p><p style="margin-top:15px;">Don't have an account?

<a href="signup.html"
style="
color:#0056d2;
font-weight:bold;
text-decoration:none;
">
Create Account
</a>

</p><p style="
margin-top:15px;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
"><input
type="checkbox"
id="showPassword"
onclick="togglePassword()"
style="width:auto;">

<label style="
margin:0;
font-weight:normal;
">
Show Password
</label>

</p></div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
sendPasswordResetEmail
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAJWdsNykkCp9tJfoBiZNoVfWT0orM6BHA",

authDomain:
"indupalli-services-18404.firebaseapp.com",

projectId:
"indupalli-services-18404",

storageBucket:
"indupalli-services-18404.firebasestorage.app",

messagingSenderId:
"187485195719",

appId:
"1:187485195719:web:a2f422b12c47ea2d549de2"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

window.login = function(){

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value.trim();

if(email === "" || password === ""){

showPopup(`
<h2 style="color:#dc3545;">
Missing Information
</h2>

<p>
Please enter your email address and password.
</p>
`);

return;

}

signInWithEmailAndPassword(
auth,
email,
password
)

.then((userCredential)=>{

localStorage.setItem(
"userEmail",
userCredential.user.email
);

showPopup(`
<h2 style="color:#28a745;">
Login Successful
</h2>

<p>
Welcome back to Indupalli Services.
</p>
`);

document.querySelector(
"#customPopup button"
).onclick = function(){

closePopup();

window.location.href =
"apply.html";

};

})

.catch((error)=>{

showPopup(`
<h2 style="color:#dc3545;">
Login Failed
</h2>

<p>
Invalid email address or password.
</p>
`);

});

};

window.forgotPassword = function(){

document.getElementById(
"forgotPopup"
).style.display = "flex";

};

window.sendResetLink = function(){

const email =
document.getElementById(
"resetEmail"
).value.trim();

if(email===""){

showPopup(
"Please enter your email address."
);

return;

}

sendPasswordResetEmail(
auth,
email
)

.then(()=>{

closeForgotPopup();

showPopup(`
<h2 style="color:#28a745;">
Password Reset Link Sent
</h2>

<p>
Please check your Inbox, Spam and Promotions folders.
</p>
`);

})

.catch((error)=>{

if(error.code === "auth/user-not-found"){

closeForgotPopup();

showPopup(`
<h2 style="color:#dc3545;">
Account Not Found
</h2>

<p>
No Job Seeker account is registered with this email address.
</p>
`);

}else{

closeForgotPopup();

showPopup(`
<h2 style="color:#dc3545;">
Password Reset Failed
</h2>

<p>
${error.message}
</p>
`);

}

});

};

window.closeForgotPopup = function(){

document.getElementById(
"forgotPopup"
).style.display = "none";

};

window.togglePassword = function(){

const password =
document.getElementById("password");

password.type =
password.type === "password"
? "text"
: "password";

};
</script><div id="customPopup"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
"><div style="
background:white;
width:90%;
max-width:420px;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:
0 10px 30px rgba(0,0,0,0.3);
"><img src="1000174411.png"
style="
width:120px;
margin-bottom:15px;
">

<h2 style="
color:#0056d2;
">
Indupalli Services
</h2><div id="popupMessage"
style="
margin-top:15px;
line-height:1.8;
">
</div><button
onclick="closePopup()"
style="
margin-top:20px;
">
OK
</button>

</div></div><div id="forgotPopup"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
"><div style="
background:white;
width:90%;
max-width:420px;
padding:30px;
border-radius:20px;
text-align:center;
"><img src="1000174411.png"
style="
width:120px;
margin-bottom:15px;
">

<h2 style="
color:#0056d2;
">
Forgot Password
</h2><p style="
margin:15px 0;
color:#555;
">
Enter your registered email address
</p><input
type="email"
id="resetEmail"
placeholder="Registered Email Address">

<button
onclick="sendResetLink()">
Send Reset Link
</button>

<button
onclick="closeForgotPopup()"
style="
background:#777;
margin-top:10px;
">
Cancel
</button>

</div></div><script>

function showPopup(message){

document.getElementById(
"popupMessage"
).innerHTML = message;

document.getElementById(
"customPopup"
).style.display = "flex";

}

function closePopup(){

document.getElementById(
"customPopup"
).style.display = "none";

}

</script></body>
</html>
